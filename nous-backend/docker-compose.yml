services:
  nous-backend:
    build: .
    image: nous-backend:dev
    container_name: nous-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=2)"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s
